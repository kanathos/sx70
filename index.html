<!DOCTYPE html>
<html>
<body>
    <script>
        function calculateSX70(sn) {
            sn = sn.toUpperCase().replace(/\s+/g, '');
            if (sn.length === 10 && /^[A-M]/.test(sn)) { sn = "0" + sn; }
            if (sn.length !== 11) return "Invalid SN";
            
            var monthMap = {"A":1,"B":2,"C":3,"D":4,"E":5,"F":6,"G":7,"H":8,"J":9,"K":10,"L":11,"M":12};
            var m = monthMap[sn.charAt(1)];
            var yDigit = parseInt(sn.charAt(2));
            var y = (yDigit < 2 ? 1980 : 1970) + yDigit;
            
            var dayX = [0,4,7,10,14,17,20,24,27,30];
            var a = parseInt(sn.charAt(9));
            var b = parseInt(sn.charAt(10));
            var d = dayX[a] + Math.floor((b + 2) / 3);
            
            return y + "-" + m + "-" + d;
        }
    </script>
</body>
</html>
