<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        /**
         * 纯逻辑运算函数
         * @param {string} sn 传入的已处理好的 11 位大写序列号
         * @param {string} color 传入的颜色变量 ("Silver" 或 "Plastic")
         */
        function calculateSX70Details(sn, color) {
            try {
                // 1. Birthday 计算 (第 2, 3, 10, 11 位)
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                const monthMap = {"A":1,"B":2,"C":3,"D":4,"E":5,"F":6,"G":7,"H":8,"J":9,"K":10,"L":11,"M":12};
                
                let mCode = sn.charAt(1);
                let mIdx = monthMap[mCode] - 1;
                let yDigit = parseInt(sn.charAt(2));
                let year = (yDigit < 2 ? 1980 : 1970) + yDigit;
                
                // OpenSX70 核心日期偏移逻辑
                const dayX = [0, 4, 7, 10, 14, 17, 20, 24, 27, 30];
                let a = parseInt(sn.charAt(9)); 
                let b = parseInt(sn.charAt(10));
                let day = dayX[a] + Math.floor((b + 2) / 3);
                
                let birthday = `${monthNames[mIdx]} ${day}, ${year}`;

                // 2. 精确机型判断 (Model)
                let model = "SX-70 Series";
                const prefix = sn.charAt(0);
                
                if (year >= 1978 && (prefix === '5' || prefix === '6')) {
                    model = "SX-70 Sonar OneStep";
                } else if (year >= 1977) {
                    model = (color === "Silver") ? "Alpha 1 Plated" : "Alpha 1 Model 2";
                } else {
                    model = (color === "Silver") ? "Model 1" : "Model 2";
                }

                // 3. 配置与班次 (Config & Shift)
                let config = (year <= 1975 && prefix === '0') ? 'hybrid "Q" shutter' : "Standard/Alpha Shutter";
                if (year >= 1977) config = "Improved Alpha Shutter";

                const shiftMap = ["C", "A", "B"];
                let shift = shiftMap[b % 3];
                let cameraNum = sn.substring(3, 8); // 提取中间流水号

                // 4. 格式化输出文本
                return `Serial Number : \n${sn}\n\nConfig : \n${config}\n\nModel : \n${model}\n\nBirthday : \n${birthday}\n\nCamera Number : \n${cameraNum}\n\nShift Number : \n${shift}`;

            } catch (e) {
                return "Error: Data parsing failed. Please check the Serial Number format.";
            }
        }

        // 挂载函数到窗口，确保快捷指令可以访问
        window.calculateSX70Details = calculateSX70Details;
    </script>
</body>
</html>
